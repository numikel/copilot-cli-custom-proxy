# Example configuration — copy this to `config.toml` and fill in your own values.
#
# config.toml is in .gitignore so your private endpoint address and model names
# never end up in the repository. You do NOT put the API key here — you enter it
# in the app's settings window (it is kept in memory only).

# Local address the proxy listens on. In Copilot CLI set:
#   COPILOT_PROVIDER_BASE_URL=http://127.0.0.1:8080
listen_addr = "127.0.0.1:8080"

# Base URL of your OpenAI-compatible corporate endpoint (Chat Completions API).
# The request path from Copilot (e.g. /chat/completions) is appended to this URL.
corporate_base_url = "https://your-endpoint.example.com/v1"

# Model selected at startup (must be present in the `models` list).
default_model = "model-a"

# List of models shown in the tray menu for quick switching.
models = ["model-a", "model-b", "model-c"]
