# OPTIONAL seed configuration.
#
# As of v0.3.0 the proxy is configured entirely in the app's settings window and
# persists to `config.json` next to the executable. `config.toml` is no longer
# required — it is only read ONCE, on first run, to seed `config.json` when no
# `config.json` exists yet (handy for migrating an older install or pre-baking a
# deployment). After that first run it is ignored.
#
# You do NOT put the API key here — you enter it in the settings window (it is
# kept in memory only).

# Local address the proxy listens on. Editable later in the settings window.
listen_addr = "127.0.0.1:8080"

# Base URL of your OpenAI-compatible endpoint. On migration this is combined with
# the first entry of `upstream_apis` below to build the full endpoint URL stored
# in config.json (e.g. ".../v1" + "chat" -> ".../v1/chat/completions").
#
# NOTE: in the settings window you instead enter the FULL endpoint URL, ending in
# /chat/completions or /responses — never stopping at /v1 (otherwise the wire API
# is ambiguous).
corporate_base_url = "https://your-endpoint.example.com/v1"

# Which OpenAI-compatible API to seed as active. The new model has ONE active API
# at a time (a switch in the settings window), so only the FIRST entry is used on
# migration:
#   "chat"      -> /chat/completions  (e.g. GitHub Copilot CLI)
#   "responses" -> /responses         (e.g. Codex CLI)
upstream_apis = ["chat"]

# Optional model selected at startup. The model list itself is fetched from
# {endpoint base}/models once you enter your API key (and via "Refresh models").
# default_model = "model-a"
