name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what gets in the way today?
      placeholder: I use endpoint X which serves both APIs and I'd like to…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the app to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - proxy-core (forwarding, model swap, classification)
        - Tray menu / icon
        - Settings window (webview)
        - Agent launching (Copilot / Codex)
        - Packaging / CI
        - Other
