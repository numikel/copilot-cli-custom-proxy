name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_bundle:
        description: Build MSI/NSIS installers
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test core (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: proxy-core

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy -p proxy-core --all-targets -- -D warnings

      - name: Run core tests
        run: cargo test -p proxy-core

      # Pure webview helpers (dist/validation.js) — Node's built-in runner, no
      # npm install needed (the runner image ships a recent Node).
      - name: Run webview tests
        run: node --test "src-tauri/webview-tests/*.test.js"

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    env:
      # Mitigate transient crates.io TLS flakes on windows-latest (schannel).
      CARGO_NET_RETRY: 10
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Cache tauri-cli
        uses: actions/cache@v4
        id: tauri-cli-cache
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-2-${{ runner.os }}-v1

      - name: Install Tauri CLI
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            cargo install tauri-cli --version "^2.0" --locked
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -eq $max) { exit $LASTEXITCODE }
            Write-Host "tauri-cli install attempt $i failed, retrying in 30s..."
            Start-Sleep -Seconds 30
          }

      - name: Clippy (warnings as errors)
        run: cargo clippy -p copilot-proxy --all-targets -- -D warnings

      - name: Build (release)
        shell: pwsh
        run: |
          $fullBundle = $false
          if ("${{ github.ref }}" -eq 'refs/heads/main') { $fullBundle = $true }
          if ("${{ github.event_name }}" -eq 'workflow_dispatch' -and '${{ inputs.full_bundle }}' -eq 'true') { $fullBundle = $true }

          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            if ($fullBundle) {
              cargo tauri build -- --locked
            } else {
              cargo tauri build --no-bundle -- --locked
            }
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -eq $max) { exit $LASTEXITCODE }
            Write-Host "Build attempt $i failed, retrying in 30s..."
            Start-Sleep -Seconds 30
          }

      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: copilot-proxy-exe
          path: target/release/copilot-proxy.exe

      - name: Upload installers
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.full_bundle)
        uses: actions/upload-artifact@v7
        with:
          name: copilot-proxy-installers
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*-setup.exe
          if-no-files-found: warn
