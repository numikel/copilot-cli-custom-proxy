name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test core (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run core tests
        run: cargo test -p proxy-core

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build (release + bundles)
        run: cargo tauri build

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: copilot-proxy-exe
          path: target/release/copilot-proxy.exe

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: copilot-proxy-installers
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*-setup.exe
          if-no-files-found: warn

      - name: Attach to GitHub Release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/release/copilot-proxy.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*-setup.exe
