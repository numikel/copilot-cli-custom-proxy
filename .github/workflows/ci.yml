name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test core (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run core tests
        run: cargo test -p proxy-core

      # Pure webview helpers (dist/validation.js) — Node's built-in runner, no
      # npm install needed (the runner image ships a recent Node).
      - name: Run webview tests
        run: node --test "src-tauri/webview-tests/*.test.js"

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    env:
      # Mitigate transient crates.io TLS flakes on windows-latest (schannel).
      CARGO_NET_RETRY: 10
      CARGO_HTTP_MULTIPLEXING: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        shell: pwsh
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            cargo install tauri-cli --version "^2.0"
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -eq $max) { exit $LASTEXITCODE }
            Write-Host "tauri-cli install attempt $i failed, retrying in 30s..."
            Start-Sleep -Seconds 30
          }

      - name: Build (release + bundles)
        shell: pwsh
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            cargo tauri build --locked
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -eq $max) { exit $LASTEXITCODE }
            Write-Host "Build attempt $i failed, retrying in 30s..."
            Start-Sleep -Seconds 30
          }

      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: copilot-proxy-exe
          path: target/release/copilot-proxy.exe

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: copilot-proxy-installers
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*-setup.exe
          if-no-files-found: warn

      - name: Attach to GitHub Release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/release/copilot-proxy.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*-setup.exe
