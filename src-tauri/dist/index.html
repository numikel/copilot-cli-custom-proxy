<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copilot Proxy — Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 20px;
        font-size: 14px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 14px;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 12px 0 4px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #8884;
        border-radius: 6px;
        background: #0001;
        font-size: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      .row > * {
        flex: 1;
      }
      button {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        background: #4f46e5;
        color: white;
        font-weight: 600;
        cursor: pointer;
        flex: 0 0 auto;
      }
      button:hover {
        background: #4338ca;
      }
      button.secondary {
        background: #059669;
      }
      button.secondary:hover {
        background: #047857;
      }
      .hint {
        font-weight: 400;
        font-size: 11px;
        opacity: 0.7;
      }
      pre {
        margin: 8px 0 0;
        padding: 10px;
        border-radius: 6px;
        background: #0002;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
        user-select: text;
      }
      .meta {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #8883;
        font-size: 12px;
        opacity: 0.85;
        line-height: 1.6;
      }
      .badge {
        font-weight: 700;
      }
      .ok {
        color: #16a34a;
      }
      .warn {
        color: #d97706;
      }
      #toast {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <h1>Copilot Proxy</h1>

    <label for="apikey">API key (kept in memory only)</label>
    <div class="row">
      <input id="apikey" type="password" placeholder="paste your API key…" autocomplete="off" />
      <button id="save">Save</button>
    </div>

    <label for="model">Active model <span id="modelhint" class="hint"></span></label>
    <div class="row">
      <select id="model"></select>
      <button id="refresh">Refresh</button>
    </div>

    <label>Start Copilot</label>
    <div class="row">
      <button id="runcopilot" class="secondary">Run Copilot</button>
      <button id="copycmds">Copy commands</button>
    </div>
    <pre id="cmds" title="Paste these into your own PowerShell"></pre>

    <div id="toast"></div>

    <div class="meta">
      Key status: <span id="keystatus" class="badge"></span><br />
      Endpoint: <span id="endpoint"></span><br />
      Proxy listening on: <span id="listen"></span><br />
      Requests forwarded: <span id="reqcount" class="badge">0</span><br />
      Last request: <span id="lastreq">—</span>
    </div>

    <script>
      const invoke = window.__TAURI__.core.invoke;
      const $ = (id) => document.getElementById(id);

      function toast(msg, isError) {
        const el = $("toast");
        el.textContent = msg;
        el.style.color = isError ? "#dc2626" : "#16a34a";
        setTimeout(() => (el.textContent = ""), 2500);
      }

      // Same env the "Run Copilot" button sets — offered for manual copy-paste.
      const MODEL_LABEL = "copilot-proxy-model";
      function commandsFor(listenAddr) {
        return (
          '$env:COPILOT_PROVIDER_BASE_URL="http://' + listenAddr + '"\n' +
          '$env:COPILOT_MODEL="' + MODEL_LABEL + '"\n' +
          "copilot"
        );
      }

      async function refresh() {
        const s = await invoke("get_state");
        $("endpoint").textContent = s.corporate_base_url;
        $("listen").textContent = s.listen_addr;
        $("cmds").textContent = commandsFor(s.listen_addr);

        const keyEl = $("keystatus");
        keyEl.textContent = s.has_api_key ? "set" : "missing";
        keyEl.className = "badge " + (s.has_api_key ? "ok" : "warn");

        $("modelhint").textContent =
          s.models.length === 0
            ? "— set API key, then Refresh"
            : "(" + s.models.length + " available)";

        const select = $("model");
        // Don't clobber the dropdown while the user is interacting with it.
        if (document.activeElement !== select) {
          select.innerHTML = "";
          for (const m of s.models) {
            const opt = document.createElement("option");
            opt.value = m;
            opt.textContent = m;
            if (m === s.selected_model) opt.selected = true;
            select.appendChild(opt);
          }
        }

        const log = s.request_log;
        $("reqcount").textContent = log.count;
        if (log.count > 0) {
          const status = log.last_status === null ? "pending" : log.last_status;
          $("lastreq").textContent =
            log.last_model + " → " + log.last_target + " (" + status + ")";
        }
      }

      async function fetchModels(announce) {
        try {
          const models = await invoke("refresh_models");
          if (announce) toast("Fetched " + models.length + " models.");
          await refresh();
        } catch (err) {
          if (announce) toast(String(err), true);
        }
      }

      $("save").addEventListener("click", async () => {
        const key = $("apikey").value;
        await invoke("set_api_key", { key });
        $("apikey").value = "";
        if (key) {
          toast("API key saved — fetching models…");
          await fetchModels(true); // auto-load models once the key is set
        } else {
          toast("API key cleared.");
          await refresh();
        }
      });

      $("refresh").addEventListener("click", () => fetchModels(true));

      $("model").addEventListener("change", async (e) => {
        try {
          await invoke("set_model", { model: e.target.value });
          toast("Switched model to " + e.target.value + ".");
        } catch (err) {
          toast(String(err), true);
        }
      });

      $("runcopilot").addEventListener("click", async () => {
        try {
          await invoke("run_copilot");
          toast("Launched Copilot in a new terminal.");
        } catch (err) {
          toast(String(err), true);
        }
      });

      $("copycmds").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText($("cmds").textContent);
          toast("Commands copied to clipboard.");
        } catch (err) {
          toast("Copy failed — select the text manually.", true);
        }
      });

      refresh();
      // Poll so forwarded-traffic stats update live while you use Copilot.
      setInterval(refresh, 1500);
    </script>
  </body>
</html>
